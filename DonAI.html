<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
  <div id="main">

  <nav>
   <div class="nav-container header">
        <div class="logo" >
            <img src="./DonAi.png" alt="logo">
        </div>
        <div class="home">
            <a href="" target="_self">Home</a>
        </div>
        <div class="About">
            <a href="" target="_self">About</a>
        </div>
        <div class="empty"></div>
        <div class="login">
            <a href="login.html" target="_self">Login</a>
        </div>
    </div>
    </nav>
    
    <div class="chat" >
        <div id="chat" class="ca"></div>
        <div class="text">
                <input type="text" id="input" placeholder="Type your message..." onkeypress="if(event.key=='Enter') sendMessage()"  class = "type">
                <button class="size" type="submit" name="Enter" onclick="sendMessage()">Send</button>
        </div>
    </div>
  
</body>
</html>
<script>
     function sendMessage(){
        const input=document.getElementById('input');
        const chat=document.getElementById('chat');
        const message=input.value.trim();

        if (!message) return;

        chat.innerHTML+= '<div class="user">You: '+message +' </div>';
        input.value='';
        fetch('/chat',{
            method:"POST",
            headers:{'Content-type':'application/json'},
            body:JSON.stringify({message:message})
        })
        .then(response => response.json())
        .then(data =>{

            chat.innerHTML+='<div class="bot">'+data.response +'</div>';
            chat.scrollTop=chat.scrollHeight;
        });
     }
</script>
